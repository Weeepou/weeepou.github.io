<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Náboženství | Santh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="logo">Santh</a>
            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="timeline.html" class="nav-link">Timeline</a></li>
                    <li><a href="characters.html" class="nav-link">Characters</a></li>
                    <li><a href="monsterManual.html" class="nav-link">Monster Manual</a></li>
                    <li><a href="lore.html" class="nav-link">Lore</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="page-content">
        <section class="container">
            <h1>Náboženství Santhu</h1>
            <div class="grid grid-3">
                <div class="card" onclick="openModal('Bohové','První Bohové', 'Pantheon', 'TBD')">
                    <h3>První Bohové</h3>
                    <p class="text-accent">Pantheon</p>
                </div>
                <div class="card" onclick="openModal('Bůh','Plamen (Ar\'Gath)', 'Oheň', 'TBD')">
                    <h3>Plamen (Ar'Gath)</h3>
                    <p class="text-accent">Zelený plamen (nástroj?)</p>
                </div>
                <div class="card" onclick="openModal('Bohyně','Divočina (Wildmother)', 'Příroda', 'TBD')">
                    <h3>Divočina (Wildmother)</h3>
                    <p class="text-accent">Pohanství</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal Shared Structure -->
    <div id="modal" class="modal-overlay">
        <div class="modal-window" onclick="event.stopPropagation()">
            <header class="modal-header">
                <div>
                    <p id="modal-type" class="text-accent" style="text-transform: uppercase; font-size: 12px; font-weight: bold;"></p>
                    <h2 id="modal-title">Název</h2>
                    <p id="modal-meta" class="text-muted"></p>
                </div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </header>
            <div id="modal-body" style="border-top: 1px solid var(--clr-border); padding-top: var(--space-s);">
                <p id="modal-desc"></p>
            </div>
        </div>
    </div>

    <footer class="footer container">
        <p>&copy; 2026 Santh | Studentský projekt pro D&D</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
