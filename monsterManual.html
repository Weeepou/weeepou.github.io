<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postavy | Santh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="logo">Santh</a>
            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="timeline.html" class="nav-link">Timeline</a></li>
                    <li><a href="characters.html" class="nav-link">Characters</a></li>
                    <li><a href="monsterManual.html" class="nav-link active">Monster Manual</a></li>
                    <li><a href="lore.html" class="nav-link">Lore</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="page-content">
        <section class="container">
            <h1>Monstra</h1>
            <div class="grid grid-4 mb-m" style="margin-bottom: var(--space-m);">
                <div class="card" onclick="openModal('Monstrum', 'Skeleton', 'Undead', 'radiant hurt, necrotic not hurt')">
                    <h3>Skeleton</h3>
                    <p class="text-accent">Undead</p>
                </div>
                
                <div class="card" onclick="openModal('Monstrum', 'Big carnivorous plant', 'Plant', 'ham?')">
                    <h3>Big carnivorous plant</h3>
                    <p class="text-accent">Plant</p>
                </div>
                
                <div class="card" onclick="openModal('Monstrum', 'Troll/Ogre?', 'Giant', 'Fire hurt')">
                    <h3>Troll/Ogre?</h3>
                    <p class="text-accent">Giant</p>
                </div>

                <div class="card" onclick="openModal('Monstrum', 'Sběh', 'Aberration', 'Screeech?')">
                    <h3>Sběh</h3>
                    <p class="text-accent">Aberration</p>
                </div>
            </div>
        </section>
    </main>

    <div id="modal" class="modal-overlay">
        <div class="modal-window" onclick="event.stopPropagation()">
            <header class="modal-header">
                <div>
                    <p id="modal-type" class="text-accent"></p>
                    <h2 id="modal-title">Název</h2>
                    <p id="modal-meta" class="text-muted"></p>
                </div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </header>
            <div id="modal-body">
                <p id="modal-desc"></p>
            </div>
        </div>
    </div>

    <footer class="footer container">
        <p>&copy; 2026 Santh | Studentský projekt pro D&D</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
